name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Update version in pyproject.toml
        run: >
          sed -i 's/^version = ".*"/version = "${{ needs.release.outputs.new_release_version }}"/'
          pyproject.toml

      - name: Authenticate with Cloudsmith (OIDC)
        uses: cloudsmith-io/cloudsmith-cli-action@v1
        with:
          oidc-namespace: ${{ vars.CLOUDSMITH_OIDC_NAMESPACE }}
          oidc-service-slug: ${{ vars.CLOUDSMITH_OIDC_SERVICE_SLUG }}

      - name: Log in to Cloudsmith Docker registry
        run: >
          echo "$CLOUDSMITH_API_KEY"
          | docker login docker.cloudsmith.io -u token --password-stdin

      - name: Build Docker image
        run: >
          docker build
          -t docker.cloudsmith.io/mrtam/coral-bot/coral-bot:${{ needs.release.outputs.new_release_version }}
          -t docker.cloudsmith.io/mrtam/coral-bot/coral-bot:latest
          .

      - name: Push Docker image
        run: |
          docker push docker.cloudsmith.io/mrtam/coral-bot/coral-bot:${{ needs.release.outputs.new_release_version }}
          docker push docker.cloudsmith.io/mrtam/coral-bot/coral-bot:latest
